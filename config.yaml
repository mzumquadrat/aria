# ===========================================
# Aria Personal Assistant Configuration
# ===========================================
# This file configures Aria's behavior.
# Environment variables can be referenced with ${VAR_NAME}
# and will be substituted at runtime.

# -------------------------------------------
# Telegram Bot Configuration (Required)
# -------------------------------------------
telegram:
  # Your bot token from @BotFather
  bot_token: ${TELEGRAM_BOT_TOKEN}

  # Restrict bot access to this Telegram user ID
  # Get your ID from @userinfobot
  # Leave empty to allow all users (not recommended for production)
  allowed_user_id: ${TELEGRAM_USER_ID}

# -------------------------------------------
# OpenRouter LLM Configuration (Required)
# -------------------------------------------
openrouter:
  # API key from https://openrouter.ai
  api_key: ${OPENROUTER_API_KEY}

  # Primary model for conversations
  # Options: anthropic/claude-sonnet-4, openai/gpt-4o, etc.
  default_model: anthropic/claude-sonnet-4

  # Fallback model if primary fails
  fallback_model: openai/gpt-4o-mini

  # Maximum tokens for LLM responses (default: 4096)
  # Increase for longer responses, decrease to save costs
  max_tokens: ${OPENROUTER_MAX_TOKENS:-4096}

  # HTTP referer for OpenRouter analytics (optional)
  http_referer: ${HTTP_REFERER:-https://github.com/mzumquadrat/aria}

# -------------------------------------------
# ElevenLabs Voice Configuration (Optional)
# -------------------------------------------
# Enable voice message transcription and TTS responses
elevenlabs:
  api_key: ${ELEVENLABS_API_KEY:-}

  # Voice for text-to-speech
  # Browse voices at https://elevenlabs.io/voice-library
  # Popular: Rachel (21m00Tcm4TlvDq8ikWAM), Adam (onwK4e9ZLuTADq8NiFz7)
  voice_id: ${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}

  # TTS model: eleven_multilingual_v2 (recommended) or eleven_monolingual_v1
  model_id: ${ELEVENLABS_MODEL_ID:-eleven_multilingual_v2}

  # STT (speech-to-text) model: scribe_v1, scribe_v1_experimental, scribe_v2
  stt_model_id: ${ELEVENLABS_STT_MODEL_ID:-scribe_v1}

# -------------------------------------------
# Brave Search Configuration (Optional)
# -------------------------------------------
# Enable web search capability for the agent
brave:
  api_key: ${BRAVE_API_KEY:-}

  # API endpoint (usually doesn't need changing)
  base_url: https://api.search.brave.com/res/v1

  # Number of results to return per search
  count: 10

# -------------------------------------------
# Calendar Configuration (Optional)
# -------------------------------------------
# Enable calendar integration (CalDAV and/or Google Calendar)
# At least one provider must be configured
calendar:
  # CalDAV provider (iCloud, Nextcloud, Radicale, etc.)
  caldav:
    # Server URL (e.g., https://caldav.icloud.com for iCloud)
    server_url: ${CALDAV_SERVER_URL:-}

    # Username (Apple ID for iCloud)
    username: ${CALDAV_USERNAME:-}

    # Password (app-specific password for iCloud)
    # For iCloud: Generate at https://appleid.apple.com > Security > App-Specific Passwords
    password: ${CALDAV_PASSWORD:-}

    # Default calendar to use (optional, uses first available if not set)
    default_calendar: ${CALDAV_DEFAULT_CALENDAR:-}

  # Google Calendar provider
  google:
    # OAuth 2.0 access token
    access_token: ${GOOGLE_CALENDAR_ACCESS_TOKEN:-}

    # Refresh token (for automatic token renewal)
    refresh_token: ${GOOGLE_CALENDAR_REFRESH_TOKEN:-}

    # OAuth client credentials (for token refresh)
    client_id: ${GOOGLE_CALENDAR_CLIENT_ID:-}
    client_secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}

    # Default calendar (usually 'primary')
    default_calendar: ${GOOGLE_CALENDAR_DEFAULT:-primary}

# -------------------------------------------
# Shell Execution Policy
# -------------------------------------------
# Controls bash command execution in sandboxed environment
shell:
  # Filesystem mounts - each mount provides access to a host directory
  # mode: "ro" for read-only, "rw" for read-write
  mounts:
    - path: ~/projects
      mountPoint: /workspace
      mode: rw
    - path: ~/documents
      mountPoint: /docs
      mode: ro
    - path: ~/downloads
      mountPoint: /downloads
      mode: rw

  # Maximum execution time per command (ms)
  timeout: 30000

  # Enable Python support via Pyodide
  enable_python: false

  # Enable network access
  enable_network: false

  # Execution limits for safety
  execution_limits:
    max_call_depth: 100
    max_command_count: 10000
    max_loop_iterations: 10000

# -------------------------------------------
# Approval Settings
# -------------------------------------------
# For sensitive operations, require user approval
approval:
  # Automatically approve read-only operations
  auto_approve_readonly: true

  # Require explicit approval for write/delete operations
  require_approval_write: true

  # Seconds to wait for approval before canceling
  approval_timeout: 300

# -------------------------------------------
# Task Scheduler
# -------------------------------------------
# For scheduled tasks and reminders
scheduler:
  # How often to check for pending tasks (ms)
  check_interval: 1000

  # Maximum tasks running simultaneously
  max_concurrent: 5

# -------------------------------------------
# Message Queue
# -------------------------------------------
# Controls message processing and parallelism
queue:
  # Maximum concurrent message processing tasks
  max_concurrent: 3

  # Default timeout for task execution (ms)
  default_timeout: 60000

# -------------------------------------------
# Logging
# -------------------------------------------
logging:
  # Log verbosity: debug, info, warn, error
  level: ${LOG_LEVEL:-info}

  # Enable audit logging for sensitive operations
  audit_enabled: true

# -------------------------------------------
# Database
# -------------------------------------------
database:
  # Path to SQLite database (stores memories, skills, etc.)
  path: ${DATABASE_PATH:-./data/aria.db}
